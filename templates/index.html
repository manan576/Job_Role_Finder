<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Job Researcher</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="glass-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-robot"></i>
                <h2>Job<span>Researcher</span></h2>
            </div>
            <nav>
                <button class="nav-btn active" data-tab="dashboard">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </button>
                <button class="nav-btn" data-tab="pending">
                    <i class="fa-solid fa-briefcase"></i> Opportunities
                </button>
                <button class="nav-btn" data-tab="applied">
                    <i class="fa-solid fa-check-double"></i> Applications
                </button>
            </nav>
            <div class="system-status">
                <div class="status-indicator"></div>
                <p id="scraper-status-text">System Idle</p>
                <small id="last-run-text">Never run</small>
            </div>
            <button class="run-btn" id="run-scraper-btn">
                <i class="fa-solid fa-play"></i> Trigger Scraper
            </button>
        </aside>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Header -->
            <header>
                <h1 id="page-title">Dashboard Overview</h1>
                <div class="user-profile">
                    <i class="fa-solid fa-user-circle"></i>
                </div>
            </header>

            <!-- Dashboard Tab -->
            <section id="tab-dashboard" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <div class="stat-info">
                            <h3>Total Extracted</h3>
                            <p id="stat-total">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-fire"></i>
                        <div class="stat-info">
                            <h3>Pending Review</h3>
                            <p id="stat-pending">0</p>
                        </div>
                    </div>
                    <div class="stat-card highlight">
                        <i class="fa-solid fa-paper-plane"></i>
                        <div class="stat-info">
                            <h3>Applications Sent</h3>
                            <p id="stat-applied">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Opportunities (Pending) Tab -->
            <section id="tab-pending" class="tab-content">
                <div class="jobs-grid" id="pending-jobs-container">
                    <!-- Cards injected via JS -->
                </div>
            </section>

            <!-- Applications (Applied) Tab -->
            <section id="tab-applied" class="tab-content">
                <div class="jobs-list" id="applied-jobs-container">
                    <!-- List items injected via JS -->
                </div>
            </section>

        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
